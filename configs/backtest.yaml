# Backtest Engine Configuration

symbols:
  - "BTCUSDT"
  - "ETHUSDT"

# Timeframes
primary_timeframe: "1h"
confirm_timeframe: "4h"

# 3-month window — enough trades for meaningful stats
start_date: "2024-01-01T00:00:00Z"
end_date:   "2024-03-31T00:00:00Z"

# Account
initial_capital: 10000.0

# Execution assumptions
taker_fee_bps: 4.0       # 0.04%
slippage_bps: 2.0        # 0.02%
fill_model: "pessimistic"

# Mode: "portfolio" (shared capital) or "per_symbol" (isolated capital)
mode: "portfolio"

seed: 42

optimize_grid:
  atr_stop_multiplier: [1.5, 2.0]
  atr_tp_multiplier:   [2.0, 3.0]
  rsi_long_max:        [60.0, 65.0]
